name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # The security core + tests are pure stdlib — no install step needed.
      # (server.py guard-imports langgraph/langchain and falls back to the
      #  stdlib engine, so the suite runs green on a bare interpreter.)
      - name: Run test suite
        run: python -m unittest discover -s tests -v
